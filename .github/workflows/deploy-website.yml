        #         github.actor == 'brandonpayton' ||
        #         github.actor == 'zaerl' ||
        #         github.actor == 'janjakes' ||
        #         github.actor == 'mho22' ||
        #         github.actor == 'ashfame'
        #     )

        # Specify runner + deployment step
        runs-on: ubuntu-latest
        permissions:
            contents: write
        environment:
            name: playground-wordpress-net-wp-cloud
        steps:
            - uses: actions/checkout@v5
              with:
                  submodules: true
                  # Allow deploying a specific ref for folks who want to pin a specific version.
                  ref: ${{ vars.GIT_REF_TO_DEPLOY }}
            - uses: ./.github/actions/prepare-playground
            - run: npx nx build playground-website
              env:
                  CORS_PROXY_URL: ${{ vars.CORS_PROXY_URL }}
                  VITE_GOOGLE_ANALYTICS_ID: G-SVTNFCP8T7
            - run: tar -czf wasm-wordpress-net.tar.gz dist/packages/playground/wasm-wordpress-net
            # Store dist/packages/artifacts/wasm-wordpress-net as a build artifact
            - uses: actions/upload-artifact@v4
              with:
                  name: playground-website
                  path: wasm-wordpress-net.tar.gz
            # The artifact only becomes available after this workflow wraps up, so let's wrap.
            # This artifact enables the download of a pre-built package and hosting of one's own playground instance.

            # - name: Commit dist to repository
            #   shell: bash
            #   run: |
            #       git config --global user.name "github-actions[bot]"
            #       git config --global user.email "github-actions[bot]@users.noreply.github.com"
            #       git add dist
            #       if git diff --cached --quiet; then
            #         echo "No changes to commit"
            #       else
            #         git commit -m "Deploy website: Update dist directory"
            #         git push origin ${{ vars.GIT_REF_TO_DEPLOY || 'trunk' }}
            #       fi

            # Deploy to Cloudways server via SSH
            # Required secrets:
            # - CLOUDWAYS_SSH_HOST: The Cloudways server hostname/IP
            # - CLOUDWAYS_SSH_USER: SSH username for Cloudways server
            # - CLOUDWAYS_SSH_PRIVATE_KEY: Private SSH key for authentication
            # - CLOUDWAYS_SSH_HOST_KEY: Known hosts entry for server verification
            # - CLOUDWAYS_DEPLOY_PATH: Target directory path on Cloudways server
            - name: Deploy to Cloudways server
              shell: bash
              run: |
                  # Setup SSH
                  mkdir -p ~/.ssh
                  chmod 700 ~/.ssh
                  echo "${{ secrets.CLOUDWAYS_SSH_HOST_KEY }}" >> ~/.ssh/known_hosts
                  echo "${{ secrets.CLOUDWAYS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  chmod 644 ~/.ssh/known_hosts

                  # Deploy website files using rsync
                  # -r: recursive, -t: preserve times, -v: verbose, -z: compress
                  # -L: follow symlinks and copy actual files (prevents error 23 with broken symlinks)
                  # --no-perms --no-owner --no-group: don't preserve ownership/permissions (may not be allowed on server)
                  # --delete: remove files on destination that don't exist in source
                  rsync -rtvzL --no-perms --no-owner --no-group -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" --delete \
                    dist/packages/playground/wasm-wordpress-net/ \
                    ${{ secrets.CLOUDWAYS_SSH_USER }}@${{ secrets.CLOUDWAYS_SSH_HOST }}:${{ secrets.CLOUDWAYS_DEPLOY_PATH }}

                  echo "Deployment to Cloudways completed successfully"

            # - name: Deploy Playground website build
